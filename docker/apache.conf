<VirtualHost *:80>
    DocumentRoot /var/www/html

    # Route /api/* requests to Slim's front controller
    Alias /api /var/www/backend/public

    <Directory /var/www/backend/public>
        AllowOverride None
        Require all granted
        Options -Indexes

        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteRule ^ index.php [QSA,L]
    </Directory>

    <Directory /var/www/html>
        AllowOverride All
        Require all granted
        Options -Indexes
        # Serve index.html for any path not matching a real file (React Router support)
        FallbackResource /index.html
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
