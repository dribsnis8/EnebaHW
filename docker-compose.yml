services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: games
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:80"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/games
    depends_on:
      postgres:
        condition: service_healthy
